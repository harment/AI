##############################################################
# إعدادات nginx المكافئة لملف .htaccess الخاص بالاباتشي
# ضع هذا الكتلة داخل server { } في إعداد nginx الخاص بك
##############################################################

server {
    listen 80;
    # listen 443 ssl; # فعّل عند استخدام HTTPS

    server_name example.com www.example.com;   # غيّر إلى اسم نطاقك
    root /var/www/html;                         # غيّر إلى مسار المشروع
    index index.php index.html;

    # ===================================================
    # تعطيل قوائم المجلدات (Options -Indexes)
    # ===================================================
    autoindex off;

    # ===================================================
    # قواعد إعادة التوجيه (Rewrite rules)
    # ===================================================

    # تشغيل الملفات الثابتة مباشرةً
    location / {
        try_files $uri $uri/ =404;
    }

    # مسارات API: تحويل /api/xxx إلى /api/xxx.php (فقط إن لم يحتوِ المسار على امتداد)
    location ~ ^/api/([^.]+)$ {
        try_files /api/$1.php =404;
        fastcgi_pass unix:/run/php/php-fpm.sock;  # غيّر حسب إصدار PHP-FPM
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/api/$1.php;
    }

    # تشغيل ملفات PHP العامة
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php-fpm.sock;  # غيّر حسب إصدار PHP-FPM
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ===================================================
    # إعدادات PHP — لا تُضبط في nginx
    # يجب ضبطها في php.ini أو www.conf الخاص بـ PHP-FPM:
    #   upload_max_filesize = 50M
    #   post_max_size       = 52M
    #   max_execution_time  = 120
    #   memory_limit        = 256M
    # ===================================================

    # ===================================================
    # رؤوس الأمان (Security headers)
    # ===================================================
    add_header X-Content-Type-Options   "nosniff"                    always;
    add_header X-Frame-Options          "SAMEORIGIN"                 always;
    add_header X-XSS-Protection         "1; mode=block"              always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ===================================================
    # حماية ملفات SQL الحساسة (Protect sensitive files)
    # ===================================================
    location ~* \.sql$ {
        deny all;
        return 403;
    }

    # ===================================================
    # تخزين مؤقت للأصول الثابتة (Cache static assets)
    # ===================================================
    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ~* \.(png|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ===================================================
    # إعدادات Service Worker — sw.js (Service Worker scope)
    # ===================================================
    location = /sw.js {
        add_header Cache-Control        "no-cache"  always;
        add_header Service-Worker-Allowed "/"       always;
        try_files $uri =404;
    }
}
